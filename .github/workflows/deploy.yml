name: Deploy to VPS
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --include='*.html' \
            --include='*.css' \
            --include='*.js' \
            --include='*.png' \
            --include='*.jpg' \
            --include='*.jpeg' \
            --include='*.gif' \
            --include='*.svg' \
            --include='*.ico' \
            --include='*.webp' \
            --exclude='*' \
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no 
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/sito-test/
      - name: Set permissions on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "chmod -R 755 /var/www/sito-test && chown -R www-data:www-data /var/www/sito-test"
